    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --accent: #f43f5e; --glass: rgba(255, 255, 255, 0.9); }
        
        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(at 0% 0%, #ffffff 0%, #f9fafb 100%), radial-gradient(at 100% 0%, #e0e7ff 0%, transparent 40%), radial-gradient(at 50% 100%, #fef2f2 0%, transparent 40%); 
            background-attachment: fixed; 
            color: #1f2937; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        .top-bar { background: linear-gradient(90deg, var(--primary-dark), var(--primary)); color: white; text-align: center; padding: 10px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .wrapper { max-width: 1000px; margin: auto; padding: 15px; text-align: center; }
        
        .hero { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            padding: 40px 20px; 
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.6); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); 
            margin-top: 10px; 
        }

        h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 5vw, 48px); color: #111827; margin-bottom: 15px; line-height: 1.2; }
        .old { text-decoration: line-through; color: #9ca3af; font-size: 18px; }
        .new { font-size: clamp(45px, 8vw, 65px); color: var(--primary); font-weight: 800; display: block; margin: 5px 0; }
        
        /* BOTÓN CON TODAS LAS ANIMACIONES FUSIONADAS */
        .btn { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: white !important; 
            padding: 18px 35px; 
            border-radius: 100px; 
            text-decoration: none; 
            font-weight: 800; 
            display: inline-block; 
            font-size: clamp(15px, 4.5vw, 19px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); 
            transition: 0.3s; 
            cursor: pointer; 
            border: none;
            position: relative;
            overflow: hidden; /* Necesario para que el brillo no se salga */
            width: auto;
            max-width: 95%;
            /* FUSIÓN DE ANIMACIONES: Flote y Pulso */
            animation: floatBtn 3s ease-in-out infinite, pulse 2.5s infinite;
        }

        /* El reflejo de luz tipo vidrio (glassShine) */
        .btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.5) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(25deg);
            /* ANIMACIÓN INDEPENDIENTE DEL BRILLO */
            animation: glassShine 4s infinite;
        }

        /* DEFINICIÓN DE ANIMACIONES */
        @keyframes glassShine {
            0% { left: -120%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }

        @keyframes floatBtn {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(99, 102, 241, 0.6); transform: scale(1.02); }
            100% { box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        }

        /* Vibración al scroll (se activa por JS) */
        .vibrate { animation: shake 0.4s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            50% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }

        /* HOVER EFFECTS */
        .btn:hover { 
            transform: translateY(-5px) scale(1.04); 
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.5);
            animation: none; /* Pausa flote/pulso en hover para estabilidad */
        }
        .btn:active { transform: translateY(-2px) scale(1); }

        .timer { color: var(--accent); font-weight: 700; margin: 15px 0; display: inline-block; padding: 6px 15px; background: #fee2e2; border-radius: 50px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 30px; text-align: left; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #f3f4f6; font-size: 14px; display: flex; align-items: center; gap: 10px; }

        /* PREGUNTAS FRECUENTES (TEXTO COMPLETO) */
        .faq-container { background: white; border-radius: 25px; padding: 25px; border: 1px solid #e5e7eb; text-align: left; margin-top: 30px; }
        .faq-item { margin-bottom: 25px; border-bottom: 1px solid #f3f4f6; padding-bottom: 15px; }
        .faq-item:last-child { border: none; }
        .faq-item h3 { font-size: 17px; color: #111827; margin-bottom: 10px; font-weight: 700; }
        .faq-item p { font-size: 15px; color: #4b5563; margin: 0; line-height: 1.5; }

        .whatsapp { position: fixed; right: 15px; bottom: 15px; background: #25D366; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .whatsapp:hover { transform: scale(1.1); }
        .popup { position: fixed; left: 10px; bottom: 80px; background: white; padding: 12px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: none; z-index: 999; border-left: 4px solid var(--primary); font-size: 12px; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
